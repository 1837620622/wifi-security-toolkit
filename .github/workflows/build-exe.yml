name: Build WiFi Handshake Capture EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller scapy

      - name: Build EXE
        run: |
          cd wifi-handshake-capture
          pyinstaller --onefile --console --name "WiFi-Handshake-Capture" capture.py

      - name: Verify EXE
        run: |
          dir wifi-handshake-capture\dist\
          wifi-handshake-capture\dist\WiFi-Handshake-Capture.exe --help 2>nul || echo "EXE built (interactive mode, no --help)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WiFi-Handshake-Capture-Windows
          path: wifi-handshake-capture/dist/WiFi-Handshake-Capture.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: wifi-handshake-capture/dist/WiFi-Handshake-Capture.exe
          body: |
            ## WiFi握手包捕获工具 Windows EXE

            **下载 `WiFi-Handshake-Capture.exe` 后右键 → 以管理员身份运行**

            功能：
            - 交互式扫描附近WiFi并选择目标
            - 自动捕获PMKID/EAPoL握手包
            - 输出hashcat兼容的.22000 hashline
            - 支持批量捕获+剪贴板复制

            系统要求：Windows 10/11，管理员权限
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
